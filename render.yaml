# Deploy no Render.com (https://render.com)
# 1. Conecte o repositório GitHub
# 2. Crie o PostgreSQL e copie a DATABASE_URL
# 3. Crie o Web Service apontando para este blueprint

databases:
  - name: cafe-conecta-db
    databaseName: cafe_conecta
    user: cafe
    plan: free
    postgresMajorVersion: "16"
    ipAllowList: []

services:
  - type: web
    name: cafe-conecta-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-conecta-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: SCRAPER_INTERVAL_HOURS
        value: "6"
      - key: ADMIN_TOKEN
        generateValue: true
