name: cafe_conecta
description: Conectando produtores, corretores e compradores de café com agilidade e confiança.
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  provider: ^6.1.1
  sqflite: ^2.3.0
  path: ^1.8.3
  http: ^1.1.2
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  mask_text_input_formatter: ^2.0.0
  fl_chart: ^0.68.0
  crypto: ^3.0.3
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  cupertino_icons: ^1.0.6
  url_launcher: ^6.2.2
  sqflite_common_ffi: ^2.4.0+3
  image_picker: ^0.8.7+4
  qr_flutter: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
